<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PLUSMAN</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080810;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    user-select: none;
  }
  #hud {
    width: 780px;
    display: flex;
    justify-content: space-between;
    color: #ccc;
    font-size: 0.8em;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  canvas { border: 3px solid #333; display: block; width: 780px; height: 660px; }
  #info {
    margin-top: 8px;
    color: #444;
    font-size: 0.6em;
    text-align: center;
    letter-spacing: 1px;
  }
</style>
<style>
  #game-nav { position:fixed; top:0; left:0; right:0; z-index:9999; height:38px; background:#080810; border-bottom:1px solid #222; display:flex; align-items:stretch; justify-content:center; font-family:'Courier New',monospace; font-size:0.72em; letter-spacing:2px; }
  #game-nav a { display:flex; align-items:center; padding:0 16px; text-decoration:none; color:#555; transition:color 0.15s,background 0.15s; white-space:nowrap; }
  #game-nav .nav-portal { color:#444; border-right:1px solid #333; }
  #game-nav .nav-samurai:hover, #game-nav .nav-samurai.active { color:#c0392b; box-shadow:inset 0 -2px #c0392b; }
  #game-nav .nav-plusman:hover, #game-nav .nav-plusman.active { color:#f0d060; box-shadow:inset 0 -2px #f0d060; }
  #game-nav .nav-space:hover, #game-nav .nav-space.active { color:#38bdf8; box-shadow:inset 0 -2px #38bdf8; }
  #game-nav a:hover { background:#0d0d18; }
  body { padding-top:38px !important; }
</style>
</head>
<body>
<nav id="game-nav">
  <a href="index.html" class="nav-portal">🎮 PORTAL</a>
  <a href="samurai_fighter.html" class="nav-samurai">⚔ SAMURAI</a>
  <a href="plusman.html" class="nav-plusman active">💣 PLUSMAN</a>
  <a href="space_invaders.html" class="nav-space">👾 SPACE INV</a>
</nav>
<div id="hud">
  <span id="hud-score">SCORE: 0</span>
  <span id="hud-level">LEVEL 1</span>
  <span id="hud-lives">♥♥♥</span>
</div>
<canvas id="canvas" width="624" height="528"></canvas>
<div id="info">移動: ↑↓←→ &nbsp;|&nbsp; ボム: SPACE &nbsp;|&nbsp; ポーズ: P</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const COLS = 13, ROWS = 11, C = 48; // C = cell size
const W = COLS * C, H = ROWS * C;

// tile types
const EMPTY = 0, WALL = 1, BLOCK = 2;

let state = 'title'; // title / playing / clear / gameover
let paused = false;
let score = 0;
let level = 1;

// ===== INPUT =====
const keys = {}, jp = {};
window.addEventListener('keydown', e => {
  if (!keys[e.code]) jp[e.code] = true;
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ===== MAP =====
let map, fire;

function buildMap() {
  map = []; fire = [];
  for (let r = 0; r < ROWS; r++) {
    map[r] = []; fire[r] = [];
    for (let c = 0; c < COLS; c++) {
      fire[r][c] = 0;
      const border = r === 0 || r === ROWS-1 || c === 0 || c === COLS-1;
      const pillar = r % 2 === 0 && c % 2 === 0;
      const safe = (r <= 2 && c <= 2);
      if (border || pillar) map[r][c] = WALL;
      else if (!safe && Math.random() < 0.6) map[r][c] = BLOCK;
      else map[r][c] = EMPTY;
    }
  }
}

// ===== PLAYER =====
let p; // player object

function resetPlayer() {
  p = {
    c: 1, r: 1,           // grid position
    x: C, y: C,           // pixel position
    tc: 1, tr: 1,         // target grid
    moving: false, mp: 0, // move progress
    spd: 7,               // frames per move
    dir: 'down',
    maxBombs: 1, placed: 0,
    range: 2,
    lives: 3,
    dead: false, dt: 0,   // death timer
    inv: 0,               // invincibility frames
    af: 0, at: 0          // anim frame/timer
  };
}

function canMove(c, r) {
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return false;
  if (map[r][c] !== EMPTY) return false;
  if (bombs.some(b => b.c === c && b.r === r)) return false;
  return true;
}

function updatePlayer() {
  if (p.dead) {
    if (--p.dt <= 0) {
      if (--p.lives <= 0) { state = 'gameover'; return; }
      p.c = p.tc = 1; p.r = p.tr = 1;
      p.x = C; p.y = C;
      p.moving = false; p.dead = false; p.inv = 180; p.placed = 0;
    }
    return;
  }
  if (p.inv > 0) p.inv--;
  if (++p.at % 8 === 0) p.af = (p.af + 1) % 4;

  if (p.moving) {
    p.mp++;
    const t = p.mp / p.spd;
    p.x = (p.c + (p.tc - p.c) * t) * C;
    p.y = (p.r + (p.tr - p.r) * t) * C;
    if (p.mp >= p.spd) {
      p.c = p.tc; p.r = p.tr; p.x = p.c * C; p.y = p.r * C; p.moving = false;
      // pick up powerup
      const i = pups.findIndex(u => u.c === p.c && u.r === p.r);
      if (i >= 0) {
        const u = pups.splice(i, 1)[0];
        if (u.t === 'f') p.range = Math.min(p.range + 1, 6);
        else if (u.t === 'b') p.maxBombs = Math.min(p.maxBombs + 1, 5);
        else p.spd = Math.max(p.spd - 1, 4);
        score += 100;
      }
    }
  } else {
    let dc = 0, dr = 0;
    if (keys['ArrowLeft']  || keys['KeyA']) { dc = -1; p.dir = 'left'; }
    else if (keys['ArrowRight'] || keys['KeyD']) { dc =  1; p.dir = 'right'; }
    else if (keys['ArrowUp']    || keys['KeyW']) { dr = -1; p.dir = 'up'; }
    else if (keys['ArrowDown']  || keys['KeyS']) { dr =  1; p.dir = 'down'; }
    if ((dc || dr) && canMove(p.c + dc, p.r + dr)) {
      p.tc = p.c + dc; p.tr = p.r + dr; p.moving = true; p.mp = 0;
    }
    if (jp['Space'] && p.placed < p.maxBombs && !bombs.some(b => b.c === p.c && b.r === p.r)) {
      bombs.push({ c: p.c, r: p.r, range: p.range, t: 180, exploding: false, et: 0 });
      p.placed++;
    }
  }
}

function diePlayer() {
  if (p.dead || p.inv > 0) return;
  p.dead = true; p.dt = 80; p.placed = 0;
}

// ===== ENEMIES =====
let enemies;

function makeEnemy(c, r) {
  return { c, r, x: c*C, y: r*C, tc: c, tr: r, moving: false, mp: 0,
           spd: 11, dir: ['up','dn','lt','rt'][Math.floor(Math.random()*4)],
           dead: false, dt: 0, af: 0, at: 0, wait: 0 };
}

function buildEnemies() {
  enemies = [];
  const slots = [[COLS-2,ROWS-2],[COLS-2,1],[1,ROWS-2],[COLS-4,ROWS-4],[6,5]];
  const n = Math.min(2 + level, slots.length);
  for (let i = 0; i < n; i++) {
    const [c, r] = slots[i];
    if (map[r][c] === EMPTY) enemies.push(makeEnemy(c, r));
  }
}

function updateEnemy(e) {
  if (e.dead) { if (e.dt > 0) e.dt--; return; }
  if (++e.at % 10 === 0) e.af = (e.af + 1) % 4;

  if (e.moving) {
    e.mp++;
    const t = e.mp / e.spd;
    e.x = (e.c + (e.tc - e.c) * t) * C;
    e.y = (e.r + (e.tr - e.r) * t) * C;
    if (e.mp >= e.spd) { e.c = e.tc; e.r = e.tr; e.x = e.c*C; e.y = e.r*C; e.moving = false; }
  } else {
    if (--e.wait > 0) return;
    const dm = { up:[0,-1], dn:[0,1], lt:[-1,0], rt:[1,0] };
    const dirs = ['up','dn','lt','rt'];
    const [dc, dr] = dm[e.dir];
    const nc = e.c + dc, nr = e.r + dr;
    if (nc >= 0 && nc < COLS && nr >= 0 && nr < ROWS && map[nr][nc] === EMPTY && fire[nr][nc] === 0) {
      e.tc = nc; e.tr = nr; e.moving = true; e.mp = 0;
      if (Math.random() < 0.2) e.dir = dirs[Math.floor(Math.random()*4)];
      e.wait = 2;
    } else {
      e.dir = dirs[Math.floor(Math.random()*4)];
      e.wait = 6;
    }
  }
  // touch player
  if (!p.dead && p.inv === 0 && Math.abs(e.x - p.x) + Math.abs(e.y - p.y) < C * 0.65) diePlayer();
}

// ===== BOMBS =====
let bombs, pups;

const EXP_DUR = 35;

function explodeBomb(b) {
  if (b.exploding) return;
  b.exploding = true; b.et = 0;
  fire[b.r][b.c] = EXP_DUR;
  const hit = [[b.c, b.r]];
  [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dc,dr]) => {
    for (let i = 1; i <= b.range; i++) {
      const nc = b.c + dc*i, nr = b.r + dr*i;
      if (nc<0||nc>=COLS||nr<0||nr>=ROWS||map[nr][nc]===WALL) break;
      fire[nr][nc] = EXP_DUR;
      hit.push([nc, nr]);
      if (map[nr][nc] === BLOCK) {
        map[nr][nc] = EMPTY;
        if (Math.random() < 0.28) pups.push({ c:nc, r:nr, t:['f','b','s'][Math.floor(Math.random()*3)] });
        score += 10;
        break;
      }
    }
  });
  // chain
  bombs.forEach(ob => { if (ob !== b && !ob.exploding && hit.some(([c,r]) => c===ob.c && r===ob.r)) explodeBomb(ob); });
  // damage
  enemies.forEach(e => { if (!e.dead && hit.some(([c,r]) => c===e.c && r===e.r)) { e.dead=true; e.dt=40; score+=200; } });
  if (!p.dead && p.inv===0 && hit.some(([c,r]) => c===Math.round(p.x/C) && r===Math.round(p.y/C))) diePlayer();
}

function updateBombs() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (fire[r][c] > 0) {
        fire[r][c]--;
        if (fire[r][c] > 0 && !p.dead && p.inv===0 && Math.round(p.x/C)===c && Math.round(p.y/C)===r) diePlayer();
      }
  bombs = bombs.filter(b => {
    if (b.exploding) {
      if (++b.et >= EXP_DUR) { p.placed = Math.max(0, p.placed-1); return false; }
      return true;
    }
    if (--b.t <= 0 || fire[b.r][b.c] > 0) explodeBomb(b);
    return true;
  });
}

// ===== DRAW =====
function drawMap() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c*C, y = r*C;
      if (map[r][c] === WALL) {
        ctx.fillStyle = '#2c2c3e'; ctx.fillRect(x,y,C,C);
        ctx.fillStyle = '#3c3c52'; ctx.fillRect(x+1,y+1,C-2,3); ctx.fillRect(x+1,y+1,3,C-2);
      } else if (map[r][c] === BLOCK) {
        ctx.fillStyle = '#1a1a28'; ctx.fillRect(x,y,C,C);
        ctx.fillStyle = '#8b4513'; ctx.fillRect(x+3,y+3,C-6,C-6);
        ctx.fillStyle = '#a0522d';
        ctx.fillRect(x+5,y+7,18,9); ctx.fillRect(x+27,y+7,14,9);
        ctx.fillRect(x+5,y+30,14,9); ctx.fillRect(x+21,y+30,20,9);
        ctx.fillStyle = '#6b3010';
        ctx.fillRect(x+3,y+C/2-1,C-6,2); ctx.fillRect(x+C/2-1,y+3,2,C/2-4);
      } else {
        ctx.fillStyle = '#14141f'; ctx.fillRect(x,y,C,C);
        ctx.strokeStyle = '#1c1c2a'; ctx.lineWidth = 1; ctx.strokeRect(x,y,C,C);
      }
      // fire
      if (fire[r][c] > 0) {
        const a = Math.min(1, fire[r][c]/15);
        ctx.save(); ctx.globalAlpha = a;
        ctx.fillStyle = '#ff5500'; ctx.fillRect(x+4,y+4,C-8,C-8);
        ctx.fillStyle = '#ffcc00'; ctx.fillRect(x+14,y+14,C-28,C-28);
        // plus shape
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x+C/2,y+5); ctx.lineTo(x+C/2,y+C-5);
        ctx.moveTo(x+5,y+C/2); ctx.lineTo(x+C-5,y+C/2);
        ctx.stroke();
        ctx.restore();
      }
    }
  }
}

function drawPups() {
  pups.forEach(u => {
    const x=u.c*C, y=u.r*C;
    const col = u.t==='f'?'#ff6600':u.t==='b'?'#6644ff':'#00cc66';
    ctx.fillStyle = col+'44'; ctx.fillRect(x,y,C,C);
    ctx.font = '24px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(u.t==='f'?'🔥':u.t==='b'?'💣':'⚡', x+C/2, y+C/2+2);
  });
}

function drawBombs() {
  bombs.forEach(b => {
    if (b.exploding) return;
    const x=b.c*C+C/2, y=b.r*C+C/2;
    const pulse = b.t < 60 ? Math.sin(Date.now()/80)*2 : 0;
    ctx.beginPath(); ctx.arc(x,y,16+pulse,0,Math.PI*2);
    ctx.fillStyle = '#111'; ctx.fill();
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2; ctx.stroke();
    // fuse
    ctx.beginPath(); ctx.moveTo(x+4,y-16); ctx.quadraticCurveTo(x+14,y-26,x+18,y-30);
    ctx.strokeStyle = b.t<60?'#ff8800':'#664422'; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath(); ctx.arc(x+18,y-30,4,0,Math.PI*2);
    ctx.fillStyle = '#ffcc00'; ctx.fill();
    // shine
    ctx.beginPath(); ctx.arc(x-5,y-5,5,0,Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill();
  });
}

function drawPlayer() {
  if (p.dead) return;
  if (p.inv > 0 && Math.floor(p.inv/5)%2===0) return;
  const x=p.x+C/2, y=p.y+C/2;
  const bob = Math.sin(p.af*Math.PI/2)*1.5;
  // shadow
  ctx.beginPath(); ctx.ellipse(x,y+20,13,4,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fill();
  // body
  ctx.beginPath(); ctx.ellipse(x,y+4+bob,13,15,0,0,Math.PI*2);
  ctx.fillStyle='#dce8ff'; ctx.fill();
  ctx.strokeStyle='#7788bb'; ctx.lineWidth=1.5; ctx.stroke();
  // + mark
  ctx.fillStyle='#ee3333';
  ctx.fillRect(x-2,y-4+bob,4,13); ctx.fillRect(x-7,y+bob,14,4);
  // head
  ctx.beginPath(); ctx.arc(x,y-10+bob,10,0,Math.PI*2);
  ctx.fillStyle='#ffddaa'; ctx.fill();
  // helmet
  ctx.beginPath(); ctx.arc(x,y-10+bob,10,Math.PI,2*Math.PI);
  ctx.fillStyle='#3355cc'; ctx.fill();
  // eyes
  if (p.dir !== 'up') {
    const ex = p.dir==='left'?-2:p.dir==='right'?2:0;
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.arc(x-3+ex,y-9+bob,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+3+ex,y-9+bob,2,0,Math.PI*2); ctx.fill();
  }
  // legs
  const leg = Math.sin(p.af*Math.PI/2)*4;
  ctx.fillStyle='#3355cc';
  ctx.fillRect(x-8,y+16+bob,6,8+leg); ctx.fillRect(x+2,y+16+bob,6,8-leg);
}

function drawEnemies() {
  enemies.forEach(e => {
    if (e.dead) return;
    const x=e.x+C/2, y=e.y+C/2;
    const bob=Math.sin(e.af*Math.PI/2)*1.5;
    ctx.save(); ctx.translate(x,y);
    if (e.dir==='lt') ctx.scale(-1,1);
    // ghost body
    ctx.beginPath();
    ctx.arc(0,-6+bob,14,Math.PI,2*Math.PI);
    ctx.lineTo(14,12+bob);
    ctx.quadraticCurveTo(7,6+bob,0,12+bob);
    ctx.quadraticCurveTo(-7,6+bob,-14,12+bob);
    ctx.closePath();
    ctx.fillStyle='#cc2020'; ctx.fill();
    ctx.strokeStyle='#881010'; ctx.lineWidth=1.5; ctx.stroke();
    // eyes
    ctx.fillStyle='#ffe0e0';
    ctx.beginPath(); ctx.ellipse(-4,-8+bob,4,5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(4,-8+bob,4,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#330000';
    ctx.beginPath(); ctx.ellipse(-3,-7+bob,2,3,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(5,-7+bob,2,3,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawOverlay() {
  ctx.textAlign = 'center';
  if (state === 'title') {
    ctx.fillStyle = 'rgba(0,0,0,0.82)'; ctx.fillRect(0,0,W,H);
    ctx.font = 'bold 54px Courier New';
    ctx.fillStyle = '#f0d060'; ctx.shadowColor='#f0d060'; ctx.shadowBlur=30;
    ctx.fillText('PLUSMAN', W/2, H/2-50); ctx.shadowBlur=0;
    ctx.font = '18px Courier New'; ctx.fillStyle='#eee';
    ctx.fillText('爆弾で敵を全滅させろ！', W/2, H/2);
    ctx.font = 'bold 16px Courier New'; ctx.fillStyle='#f0d060';
    ctx.fillText('ENTER でスタート', W/2, H/2+45);
    ctx.font = '12px Courier New'; ctx.fillStyle='#666';
    ctx.fillText('🔥炎UP　💣ボムUP　⚡スピードUP', W/2, H/2+80);
  }
  if (state === 'clear') {
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
    ctx.font='bold 46px Courier New'; ctx.fillStyle='#44ff88'; ctx.shadowColor='#44ff88'; ctx.shadowBlur=25;
    ctx.fillText('STAGE CLEAR!', W/2, H/2-25); ctx.shadowBlur=0;
    ctx.font='16px Courier New'; ctx.fillStyle='#f0d060';
    ctx.fillText(`SCORE: ${score}`, W/2, H/2+20);
    ctx.font='14px Courier New'; ctx.fillStyle='#aaa';
    ctx.fillText('ENTER で次のステージへ', W/2, H/2+55);
  }
  if (state === 'gameover') {
    ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fillRect(0,0,W,H);
    ctx.font='bold 52px Courier New'; ctx.fillStyle='#ff4444'; ctx.shadowColor='#ff4444'; ctx.shadowBlur=30;
    ctx.fillText('GAME OVER', W/2, H/2-25); ctx.shadowBlur=0;
    ctx.font='16px Courier New'; ctx.fillStyle='#f0d060';
    ctx.fillText(`SCORE: ${score}`, W/2, H/2+20);
    ctx.font='14px Courier New'; ctx.fillStyle='#aaa';
    ctx.fillText('ENTER でもう一度', W/2, H/2+55);
  }
  if (paused) {
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.font='bold 44px Courier New'; ctx.fillStyle='#f0d060'; ctx.shadowColor='#f0d060'; ctx.shadowBlur=20;
    ctx.fillText('一時停止', W/2, H/2); ctx.shadowBlur=0;
    ctx.font='14px Courier New'; ctx.fillStyle='#aaa';
    ctx.fillText('P キーで再開', W/2, H/2+40);
  }
}

function updateHUD() {
  document.getElementById('hud-score').textContent = `SCORE: ${score}`;
  document.getElementById('hud-level').textContent = `LEVEL ${level}`;
  document.getElementById('hud-lives').textContent = '♥'.repeat(p.lives) + '♡'.repeat(Math.max(0,3-p.lives));
}

function startLevel() {
  buildMap(); resetPlayer(); buildEnemies();
  bombs = []; pups = []; state = 'playing';
}

// ===== LOOP =====
function loop() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#14141f'; ctx.fillRect(0,0,W,H);

  if (state === 'playing' && !paused) {
    updatePlayer();
    enemies.forEach(updateEnemy);
    updateBombs();
    if (enemies.every(e => e.dead)) state = 'clear';
  }
  if (jp['KeyP'] && state === 'playing') paused = !paused;

  if (state !== 'title') {
    drawMap(); drawPups(); drawBombs(); drawEnemies(); drawPlayer();
    updateHUD();
  } else {
    // draw static background for title
    ctx.fillStyle='#14141f'; ctx.fillRect(0,0,W,H);
  }

  drawOverlay();

  if (jp['Enter']) {
    if (state==='title') startLevel();
    else if (state==='clear') { level++; startLevel(); }
    else if (state==='gameover') { level=1; score=0; startLevel(); }
  }

  Object.keys(jp).forEach(k => delete jp[k]);
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
