</style>

<div id="title">⚔ SAMURAI FIGHTER ⚔</div>
<div id="hud">
  <div class="player-hud">
    <div class="player-name" id="p1-name">武蔵 ◀ MUSASHI</div>
    <div class="health-bar-bg" id="p1-hp-bar"><div class="health-fill" id="p1-fill"></div></div>

    <div class="player-name" id="p2-name">小次郎 <span id="cpu-badge">CPU</span></div>

  <span>MUSASHI 操作</span> &nbsp;|&nbsp;
  移動: ← / → &nbsp;|&nbsp; ガード: ↑ &nbsp;|&nbsp; 斬り: A &nbsp;|&nbsp; 重斬り: Z &nbsp;|&nbsp; 必殺（居合）: X（ゲージ満タン時） &nbsp;|&nbsp; ポーズ: SPACE
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 400;
const GROUND = H - 70;

// ===== STATE =====
let gameState = 'title';
let paused = false;
let roundWins = [0, 0];
let timer = 99;
let timerInterval = null;
let hitEffects = [];
let particles = [];
let petals = [];
let shakeX = 0, shakeY = 0;
let roundNum = 1;

// ===== FIGHTER CLASS =====
class Fighter {
  constructor(x, color, hakColor, facingRight, name, controls) {
    this.x = x;
    this.y = GROUND;
    this.color = color;       // gi color
    this.hakColor = hakColor; // hakama color
    this.name = name;
    this.controls = controls;
    this.facingRight = facingRight;
    this.hp = 200;
    this.maxHp = 200;
    this.power = 0;
    this.maxPower = 100;
    this.state = 'idle';
    this.stateTimer = 0;
    this.attackType = null;
    this.combo = 0;
    this.comboTimer = 0;
    this.invincible = 0;
    this.blocking = false;
    this.crouching = false;
    this.speed = 4;
    this.width = 40;
    this.height = 80;
    this.animFrame = 0;
    this.animTimer = 0;
    this.walkCycle = 0;
    this.jumping = false;
    this.knockback = 0;
    this.hurtTimer = 0;
    this.specialCooldown = 0;
    // AI
    this.isAI = false;
    this.virtualKeys = {};
    this.aiTimer = 0;
    this.aiAction = 'idle';
    this.aiAttackTimer = 0;
    this.aiBlockTimer = 0;
  }

  get cx() { return this.x + this.width / 2; }
  get cy() { return this.y - this.height / 2; }

  isAttacking() { return this.state === 'attack' || this.state === 'special'; }
  isHurt() { return this.state === 'hurt'; }

  tryAttack(type) {
    if (this.isAttacking() || this.isHurt()) return false;
    if (type === 'special' && this.power < 100) return false;
    if (type === 'special' && this.specialCooldown > 0) return false;
    this.state = type === 'special' ? 'special' : 'attack';
    this.attackType = type;
    this.stateTimer = type === 'punch' ? 18 : type === 'kick' ? 24 : 40;
    if (type === 'special') {
      this.power = 0;
      this.specialCooldown = 120;
      spawnSpecialEffect(this);
    }
    return true;
  }

  getHitbox() {
    if (!this.isAttacking()) return null;
    const reach = this.attackType === 'punch' ? 75 : this.attackType === 'kick' ? 95 : 130;
    const hx = this.facingRight ? this.x + this.width : this.x - reach;
    let hy, hh;
    if (this.attackType === 'punch') { hy = this.y - 72; hh = 30; }
    else if (this.attackType === 'kick') { hy = this.y - 55; hh = 30; }
    else { hy = this.y - 85; hh = 85; }
    const activeStart = this.attackType === 'special' ? 10 : 5;
    const dur = this.attackType === 'punch' ? 18 : this.attackType === 'kick' ? 24 : 40;
    const elapsed = dur - this.stateTimer;
    if (elapsed < activeStart || elapsed > dur - (this.attackType === 'special' ? 10 : 5)) return null;
    return { x: hx, y: hy, w: reach, h: hh };
  }

  getBodybox() { return { x: this.x, y: this.y - this.height, w: this.width, h: this.height }; }

  takeDamage(dmg, kbDir) {
    if (this.invincible > 0) return false;
    if (this.blocking) {
      dmg = Math.floor(dmg * 0.15);
      spawnHit(this.cx, this.cy + 20, '防御！', '#adf');
    }
    this.hp = Math.max(0, this.hp - dmg);
    this.state = this.blocking ? 'block' : 'hurt';
    this.stateTimer = this.blocking ? 8 : 22;
    this.hurtTimer = this.blocking ? 8 : 22;
    this.knockback = kbDir * (this.blocking ? 2 : 5);
    this.invincible = this.blocking ? 5 : 15;
    shakeX = kbDir * 4;
    shakeY = -2;
    return true;
  }

  // AI brain — returns attack command or null
  aiThink(player) {
    this.virtualKeys = {};
    const dist = Math.abs(this.cx - player.cx);
    if (this.aiTimer > 0) this.aiTimer--;
    if (this.aiAttackTimer > 0) this.aiAttackTimer--;
    if (this.aiBlockTimer > 0) this.aiBlockTimer--;
    if (this.isHurt() || this.isAttacking()) return null;

    // Block reaction (25%)
    if (player.isAttacking() && dist < 130 && this.aiBlockTimer === 0) {
      if (Math.random() < 0.25) { this.virtualKeys[this.controls.block] = true; return null; }
      this.aiBlockTimer = 45;
    }

    // Decision
    if (this.aiTimer === 0) {
      const r = Math.random();
      if (dist > 220) {
        this.aiAction = r < 0.6 ? 'approach' : 'idle';
        this.aiTimer = 35 + Math.floor(Math.random() * 45);
      } else if (dist < 55) {
        this.aiAction = r < 0.65 ? 'retreat' : 'pressuring';
        this.aiTimer = 20 + Math.floor(Math.random() * 30);
      } else {
        if (r < 0.22) this.aiAction = 'pressuring';
        else if (r < 0.45) this.aiAction = 'approach';
        else if (r < 0.65) this.aiAction = 'retreat';
        else this.aiAction = 'idle';
        this.aiTimer = 30 + Math.floor(Math.random() * 50);
      }
    }

    if (this.aiAction === 'approach' || this.aiAction === 'pressuring') {
      if (dist > 90) {
        if (player.cx > this.cx) this.virtualKeys[this.controls.right] = true;
        else this.virtualKeys[this.controls.left] = true;
      }
    } else if (this.aiAction === 'retreat') {
      if (player.cx > this.cx) this.virtualKeys[this.controls.left] = true;
      else this.virtualKeys[this.controls.right] = true;
    }

    if (this.aiAttackTimer > 0) return null;
    if (this.aiAction === 'pressuring' || (this.aiAction === 'approach' && dist < 110)) {
      if (dist < 100) {
        if (this.power >= 100 && dist < 120 && Math.random() < 0.15) { this.aiAttackTimer = 80; return 'special'; }
        const r = Math.random();
        if (r < 0.35) { this.aiAttackTimer = 40 + Math.floor(Math.random() * 25); return 'punch'; }
        if (r < 0.55) { this.aiAttackTimer = 50 + Math.floor(Math.random() * 25); return 'kick'; }
      }
    }
    return null;
  }

  update(other) {
    if (this.stateTimer > 0) this.stateTimer--;
    if (this.hurtTimer > 0) this.hurtTimer--;
    if (this.invincible > 0) this.invincible--;
    if (this.specialCooldown > 0) this.specialCooldown--;
    if (this.comboTimer > 0) { this.comboTimer--; if (this.comboTimer === 0) this.combo = 0; }

    if (this.stateTimer === 0 && this.state !== 'idle' && this.state !== 'walk') {
      this.state = 'idle';
      this.attackType = null;
    }

    if (this.knockback !== 0) {
      this.x += this.knockback;
      this.knockback *= 0.8;
      if (Math.abs(this.knockback) < 0.3) this.knockback = 0;
    }

    this.y = GROUND;
    this.jumping = false;

    const keys = this.isAI ? this.virtualKeys : pressedKeys;
    const c = this.controls;
    this.crouching = false;
    this.blocking = keys[c.block] && !this.isAttacking() && !this.isHurt();

    if (!this.isAttacking() && !this.isHurt() && !this.blocking) {
      let moving = false;
      if (keys[c.left]) { this.x -= this.speed; moving = true; }
      if (keys[c.right]) { this.x += this.speed; moving = true; }
      if (moving) this.state = 'walk';
      else if (this.state === 'walk' || this.state === 'idle') this.state = 'idle';
    }

    this.x = Math.max(10, Math.min(W - this.width - 10, this.x));
    if (!this.isAttacking() && !this.isHurt() && !this.blocking) {
      this.facingRight = other.x > this.x;
    }

    this.animTimer++;
    if (this.state === 'walk' && this.animTimer % 6 === 0) this.walkCycle = (this.walkCycle + 1) % 4;
    if (this.state === 'idle' && this.animTimer % 15 === 0) this.animFrame = (this.animFrame + 1) % 2;
    if (this.state !== 'hurt') this.power = Math.min(this.maxPower, this.power + 0.05);
  }

  draw() {
    const flash = this.invincible > 0 && Math.floor(this.invincible / 2) % 2 === 0;
    if (flash) return;

    ctx.save();
    const cx = this.x + this.width / 2;

    // Ground shadow
    ctx.beginPath();
    ctx.ellipse(cx, this.y + 2, 22, 5, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fill();

    ctx.translate(cx, this.y);
    if (!this.facingRight) ctx.scale(-1, 1);

    const gi = this.color;
    const hak = this.hakColor;
    const skin = '#f0d4a0';
    const blade = '#d8e8f8';
    const handle = '#6b3a1a';
    const tsuba = '#8a8040';

    const isHurtAnim = this.state === 'hurt';
    const isBlockAnim = this.blocking;
    const isAttack = this.isAttacking();
    const prog = isAttack
      ? 1 - this.stateTimer / (this.attackType === 'punch' ? 18 : this.attackType === 'kick' ? 24 : 40)
      : 0;

    const bob = this.state === 'walk' ? Math.sin(this.walkCycle * Math.PI / 2) * 3
              : this.state === 'idle' ? Math.sin(this.animFrame * Math.PI) * 1.5 : 0;

    ctx.save();
    ctx.translate(0, bob);

    if (isHurtAnim) ctx.rotate(0.15);

    // ====== HAKAMA (wide pants) ======
    ctx.fillStyle = hak;
    ctx.beginPath();
    ctx.moveTo(-15, -44);
    ctx.lineTo(15, -44);
    ctx.lineTo(22, 0);
    ctx.lineTo(-22, 0);
    ctx.closePath();
    ctx.fill();
    // hakama crease/fold lines
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0,-44); ctx.lineTo(1, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-8,-44); ctx.lineTo(-12, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(8,-44); ctx.lineTo(12, 0); ctx.stroke();

    // ====== GI / KIMONO BODY ======
    ctx.fillStyle = gi;
    ctx.beginPath();
    ctx.moveTo(-13, -76);
    ctx.lineTo(13, -76);
    ctx.lineTo(16, -44);
    ctx.lineTo(-16, -44);
    ctx.closePath();
    ctx.fill();
    // Collar
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-4,-76); ctx.lineTo(0,-62); ctx.lineTo(4,-76); ctx.stroke();

    // ====== OBI (sash) ======
    ctx.fillStyle = '#c0a020';
    ctx.fillRect(-16, -49, 32, 6);
    // Obi knot
    ctx.fillStyle = '#e0c040';
    ctx.fillRect(-5, -50, 10, 8);

    // ====== ARMS & SWORD ======
    if (isBlockAnim) {
      // Guard: arms raised, sword vertical blocking
      ctx.fillStyle = gi;
      ctx.fillRect(-19, -76, 8, 28);
      ctx.fillRect(11, -76, 8, 28);
      // Sword raised above head in block
      ctx.fillStyle = handle; ctx.fillRect(13, -104, 5, 14);
      ctx.fillStyle = tsuba;  ctx.fillRect(9, -103, 13, 4);
      ctx.fillStyle = blade;  ctx.fillRect(14, -145, 4, 44);
      // Blade tip
      ctx.beginPath(); ctx.moveTo(14,-145); ctx.lineTo(18,-145); ctx.lineTo(16,-152);
      ctx.fillStyle = blade; ctx.fill();

    } else if (isAttack && this.attackType === 'punch') {
      // 斬り (horizontal slash)
      const swing = Math.sin(prog * Math.PI);
      const ext = swing * 50;
      ctx.fillStyle = gi;
      ctx.fillRect(-19, -76, 8, 28);
      // Sword arm extends forward horizontally
      ctx.fillStyle = gi; ctx.fillRect(11, -72, 8 + ext * 0.4, 10);
      // Sword horizontal
      ctx.fillStyle = handle; ctx.fillRect(14 + ext * 0.5, -74, 16, 5);
      ctx.fillStyle = tsuba;  ctx.fillRect(14 + ext * 0.5 + 14, -77, 4, 11);
      ctx.fillStyle = blade;  ctx.fillRect(18 + ext * 0.5 + 14, -72, 60, 4);
      // Blade tip
      ctx.beginPath();
      ctx.moveTo(78 + ext * 0.5 + 14, -72);
      ctx.lineTo(78 + ext * 0.5 + 14, -68);
      ctx.lineTo(86 + ext * 0.5 + 14, -70);
      ctx.fillStyle = blade; ctx.fill();
      // Slash trail
      if (swing > 0.3) {
        ctx.save();
        ctx.globalAlpha = swing * 0.3;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(18 + ext * 0.2, -65);
        ctx.lineTo(80 + ext * 0.5 + 14, -72);
        ctx.stroke();
        ctx.restore();
      }

    } else if (isAttack && this.attackType === 'kick') {
      // 重斬り (downward slash)
      const swing = Math.sin(prog * Math.PI);
      const angle = -Math.PI * 0.5 + prog * Math.PI * 0.7;
      ctx.fillStyle = gi; ctx.fillRect(-19, -76, 8, 28);
      ctx.save();
      ctx.translate(14, -68);
      ctx.rotate(angle);
      ctx.fillStyle = gi; ctx.fillRect(-4, 0, 8, 22);
      ctx.fillStyle = handle; ctx.fillRect(-2, 22, 5, 14);
      ctx.fillStyle = tsuba;  ctx.fillRect(-6, 35, 13, 4);
      ctx.fillStyle = blade;  ctx.fillRect(-2, 39, 4, 65);
      ctx.beginPath(); ctx.moveTo(-2,104); ctx.lineTo(2,104); ctx.lineTo(0,112);
      ctx.fillStyle = blade; ctx.fill();
      ctx.restore();
      // Impact flash
      if (prog > 0.7) {
        ctx.save();
        ctx.globalAlpha = (prog - 0.7) / 0.3 * 0.5;
        ctx.fillStyle = '#fffaaa';
        ctx.beginPath();
        const impX = 14 + Math.cos(angle) * 80;
        const impY = -68 + Math.sin(angle) * 80;
        ctx.arc(impX, impY, 15, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

    } else if (isAttack && this.attackType === 'special') {
      // 居合（Iaijutsu）: fast wide sweep
      const angle = -Math.PI * 0.9 + prog * Math.PI * 1.4;
      ctx.fillStyle = gi; ctx.fillRect(-19, -76, 8, 28);
      // Two-hand grip
      ctx.fillStyle = gi; ctx.fillRect(8, -76, 8, 28);
      ctx.save();
      ctx.translate(12, -65);
      ctx.rotate(angle);
      // Both hands shown
      ctx.fillStyle = gi; ctx.fillRect(-4, 0, 8, 28);
      ctx.fillStyle = handle; ctx.fillRect(-2, 28, 5, 18);
      ctx.fillStyle = tsuba;  ctx.fillRect(-7, 45, 14, 4);
      // Long blade for special
      const grd = ctx.createLinearGradient(0, 49, 0, 135);
      grd.addColorStop(0, '#d8e8f8');
      grd.addColorStop(1, '#a0d8ff');
      ctx.fillStyle = grd;
      ctx.fillRect(-2, 49, 4, 86);
      ctx.beginPath(); ctx.moveTo(-2,135); ctx.lineTo(2,135); ctx.lineTo(0,145);
      ctx.fillStyle = '#d0f0ff'; ctx.fill();
      ctx.restore();
      // Energy glow trail
      const trailAngle = angle - Math.PI * 0.4;
      ctx.save();
      ctx.globalAlpha = 0.35 * (1 - prog);
      ctx.strokeStyle = this.color === '#c0392b' ? '#ff8866' : '#88aaff';
      ctx.lineWidth = 10;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.translate(12, -65);
      ctx.moveTo(Math.cos(trailAngle) * 50, Math.sin(trailAngle) * 50);
      ctx.lineTo(Math.cos(trailAngle) * 140, Math.sin(trailAngle) * 140);
      ctx.stroke();
      ctx.restore();

    } else {
      // Idle / walk: sword held vertically at right
      ctx.fillStyle = gi; ctx.fillRect(-19, -76, 8, 28);
      ctx.fillStyle = gi; ctx.fillRect(11, -76, 8, 28);
      // Sword: handle near waist, blade points up
      ctx.fillStyle = handle; ctx.fillRect(13, -66, 5, 16);
      ctx.fillStyle = tsuba;  ctx.fillRect(9, -67, 13, 4);
      ctx.fillStyle = blade;  ctx.fillRect(14, -115, 4, 50);
      ctx.beginPath(); ctx.moveTo(14,-115); ctx.lineTo(18,-115); ctx.lineTo(16,-122);
      ctx.fillStyle = blade; ctx.fill();
    }

    // ====== HEAD ======
    ctx.fillStyle = skin;
    ctx.beginPath();
    ctx.arc(0, -84, 12, 0, Math.PI * 2);
    ctx.fill();
    // Jaw/chin slight definition
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, -84, 12, 0.3, Math.PI - 0.3); ctx.stroke();

    // Eyes
    ctx.fillStyle = isHurtAnim ? '#e33' : '#1a0808';
    ctx.beginPath(); ctx.ellipse(4.5, -85, 2.5, 2, 0, 0, Math.PI*2); ctx.fill();
    if (!isHurtAnim) {
      ctx.fillStyle = '#1a0808';
      ctx.beginPath(); ctx.ellipse(-3, -85, 2, 1.8, 0, 0, Math.PI*2); ctx.fill();
      // Determined brow
      ctx.strokeStyle = '#1a0808'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(1,-89); ctx.lineTo(7,-87); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-6,-88); ctx.lineTo(-1,-88); ctx.stroke();
    }

    // ====== TOPKNOT ======
    ctx.fillStyle = '#1a0a04';
    // Hair sides
    ctx.beginPath(); ctx.arc(0, -84, 12, Math.PI, 2*Math.PI); ctx.fill();
    // Topknot base
    ctx.fillStyle = '#1a0a04';
    ctx.fillRect(-3, -98, 6, 16);
    // Topknot bun
    ctx.beginPath(); ctx.ellipse(0, -99, 5, 4, 0, 0, Math.PI*2); ctx.fill();
    // Hair tie (gold)
    ctx.fillStyle = '#c0a020';
    ctx.fillRect(-4, -94, 8, 3);

    ctx.restore(); // end bob + hurt rotation
    ctx.restore(); // end flip
  }
}

// ===== INPUT =====
const pressedKeys = {};
const justPressed = {};

window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    if (gameState === 'fight') paused = !paused;
    e.preventDefault(); return;
  }
  if (!pressedKeys[e.code]) justPressed[e.code] = true;
  pressedKeys[e.code] = true;
  e.preventDefault();
});
window.addEventListener('keyup', e => { pressedKeys[e.code] = false; });

// ===== FIGHTERS =====
const p1Controls = {
  left: 'ArrowLeft', right: 'ArrowRight',
  punch: 'KeyA', kick: 'KeyZ', special: 'KeyX', block: 'ArrowUp'
};
const p2Controls = {
  left: '__ai_l__', right: '__ai_r__',
  punch: '__ai_p__', kick: '__ai_k__', special: '__ai_s__', block: '__ai_b__'
};

let p1 = new Fighter(150, '#c0392b', '#2c3e50', true,  'MUSASHI', p1Controls);
let p2 = new Fighter(590, '#2471a3', '#1a2535', false, 'KOJIRO',  p2Controls);
p2.isAI = true;

let p1AttackHit = false;
let p2AttackHit = false;

// ===== EFFECTS =====
function spawnHit(x, y, text, color) {
  hitEffects.push({ x, y, text, color, life: 45, vy: -1.8 });
}
function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
      life: 30 + Math.random() * 20, color, size: 2 + Math.random() * 4
    });
  }
}
function spawnSpecialEffect(fighter) {
  spawnParticles(fighter.cx, fighter.cy, '#f0d060', 25);
  for (let i = 0; i < 8; i++) petals.push(makePetal(fighter.cx, fighter.cy, true));
}
function makePetal(x, y, burst = false) {
  return {
    x: x ?? Math.random() * W,
    y: y ?? -10,
    vx: (Math.random() - 0.5) * (burst ? 4 : 1.2),
    vy: burst ? -3 - Math.random() * 3 : 0.6 + Math.random() * 0.8,
    rot: Math.random() * Math.PI * 2,
    rotv: (Math.random() - 0.5) * 0.12,
    size: 3 + Math.random() * 4,
    alpha: 0.5 + Math.random() * 0.4,
    life: burst ? 80 + Math.random() * 40 : 200 + Math.random() * 200
  };
}

// Ambient petal spawner
let petalTimer = 0;

// ===== BACKGROUND =====
function drawBackground() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H - 70);
  sky.addColorStop(0, '#060312');
  sky.addColorStop(0.5, '#0d0525');
  sky.addColorStop(1, '#1a0830');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H - 70);

  // Stars
  ctx.fillStyle = '#ffffff55';
  [[40,25],[90,15],[170,35],[280,18],[390,28],[500,12],[620,22],[730,35],[760,10],[50,60],[330,48],[680,55]].forEach(([x,y])=>{
    ctx.beginPath(); ctx.arc(x, y, Math.random()>0.7?1.5:0.8, 0, Math.PI*2); ctx.fill();
  });

  // Moon glow
  const moonX = 640, moonY = 65;
  const mg = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 80);
  mg.addColorStop(0, 'rgba(255,240,180,0.25)');
  mg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = mg; ctx.beginPath(); ctx.arc(moonX, moonY, 80, 0, Math.PI*2); ctx.fill();
  // Moon face
  ctx.beginPath(); ctx.arc(moonX, moonY, 38, 0, Math.PI*2);
  ctx.fillStyle = '#fff8e0'; ctx.fill();
  ctx.beginPath(); ctx.arc(moonX, moonY, 36, 0, Math.PI*2);
  ctx.fillStyle = '#ffe8a0'; ctx.fill();
  // Moon craters
  ctx.fillStyle = '#f0d060';
  [[630,58,5],[652,72,3],[628,80,4]].forEach(([x,y,r])=>{
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  });

  // Far mountains (dark purple silhouette)
  ctx.fillStyle = '#1a0a2a';
  ctx.beginPath(); ctx.moveTo(0,220);
  [0,80,180,280,350,450,550,640,720,800].forEach((x,i,a)=>{
    const y = 160 + Math.sin(i*0.9)*40 + Math.cos(i*1.4)*25;
    ctx.lineTo(x,y);
  });
  ctx.lineTo(800,220); ctx.closePath(); ctx.fill();

  // Near mountains
  ctx.fillStyle = '#120820';
  ctx.beginPath(); ctx.moveTo(0,260);
  [0,60,120,200,280,360,440,520,600,700,800].forEach((x,i)=>{
    const y = 200 + Math.sin(i*1.1+0.5)*35 + Math.cos(i*0.8)*20;
    ctx.lineTo(x,y);
  });
  ctx.lineTo(800,260); ctx.closePath(); ctx.fill();

  // Pagoda silhouette (left)
  drawPagoda(ctx, 90, 265);

  // Cherry blossom trees
  drawCherryTree(ctx, -10, GROUND, 'left');
  drawCherryTree(ctx, W + 10, GROUND, 'right');

  // Ground
  const gnd = ctx.createLinearGradient(0, H-70, 0, H);
  gnd.addColorStop(0, '#2a1810');
  gnd.addColorStop(0.4, '#1a1008');
  gnd.addColorStop(1, '#0a0804');
  ctx.fillStyle = gnd;
  ctx.fillRect(0, H-70, W, 70);

  // Wood planks
  ctx.strokeStyle = '#ffffff10';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 50) {
    ctx.beginPath(); ctx.moveTo(x, H-70); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = H-60; y < H; y += 15) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Ground edge glow
  ctx.strokeStyle = '#c0391566';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, H-70); ctx.lineTo(W, H-70); ctx.stroke();
  ctx.fillStyle = '#ffffff10';
  ctx.fillRect(0, H-69, W, 2);
}

function drawPagoda(ctx, x, groundY) {
  const col = '#0d0520';
  const roof = '#18082a';
  // 5-story pagoda
  const stories = [
    {w:50,h:16,y:0}, {w:42,h:14,y:-16}, {w:34,h:12,y:-30},
    {w:26,h:10,y:-42}, {w:18,h:9,y:-52}
  ];
  stories.forEach(s => {
    // Body
    ctx.fillStyle = col;
    ctx.fillRect(x - s.w/2, groundY + s.y - s.h, s.w, s.h);
    // Roof (wider overhang)
    ctx.fillStyle = roof;
    ctx.beginPath();
    ctx.moveTo(x - s.w/2 - 8, groundY + s.y - s.h);
    ctx.lineTo(x + s.w/2 + 8, groundY + s.y - s.h);
    ctx.lineTo(x + s.w/2 + 4, groundY + s.y - s.h - 4);
    ctx.lineTo(x - s.w/2 - 4, groundY + s.y - s.h - 4);
    ctx.closePath(); ctx.fill();
  });
  // Spire
  ctx.fillStyle = col;
  ctx.fillRect(x-2, groundY-61-20, 4, 20);
  ctx.beginPath(); ctx.moveTo(x-2, groundY-81); ctx.lineTo(x+2, groundY-81); ctx.lineTo(x, groundY-90); ctx.fill();
}

function drawCherryTree(ctx, x, groundY, side) {
  const dir = side === 'left' ? 1 : -1;
  // Trunk
  ctx.strokeStyle = '#2a1408';
  ctx.lineWidth = 12;
  ctx.beginPath(); ctx.moveTo(x, groundY); ctx.lineTo(x + dir*30, groundY - 80); ctx.stroke();
  ctx.lineWidth = 8;
  ctx.beginPath(); ctx.moveTo(x+dir*30, groundY-80); ctx.lineTo(x+dir*70, groundY-130); ctx.stroke();
  ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(x+dir*40, groundY-100); ctx.lineTo(x+dir*15, groundY-145); ctx.stroke();
  // Blossom clusters
  const blossoms = [
    [dir*70, -140, 45], [dir*50, -155, 38], [dir*20, -150, 35],
    [dir*85, -120, 30], [dir*30, -130, 28], [dir*60, -110, 25]
  ];
  blossoms.forEach(([bx,by,r]) => {
    const bg = ctx.createRadialGradient(x+bx,groundY+by,0, x+bx,groundY+by,r);
    bg.addColorStop(0, 'rgba(255,180,200,0.6)');
    bg.addColorStop(0.6, 'rgba(220,120,160,0.4)');
    bg.addColorStop(1, 'rgba(180,80,120,0)');
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.arc(x+bx, groundY+by, r, 0, Math.PI*2); ctx.fill();
  });
}

// ===== PETALS =====
function updateDrawPetals() {
  petalTimer++;
  if (petalTimer % 12 === 0 && petals.length < 60) petals.push(makePetal());

  petals = petals.filter(p => p.life > 0);
  petals.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.rot += p.rotv;
    p.vx += Math.sin(p.rot * 2) * 0.01;
    p.vy += 0.02;
    p.life--;
    const a = Math.min(p.alpha, p.life / 40);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    // Petal shape (small oval)
    ctx.fillStyle = Math.random() > 0.3 ? '#ffaab8' : '#fff0f5';
    ctx.beginPath(); ctx.ellipse(0, 0, p.size, p.size*0.55, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// ===== HUD =====
function updateHUD() {
  document.getElementById('p1-fill').style.width = (p1.hp/p1.maxHp*100)+'%';
  document.getElementById('p2-fill').style.width = (p2.hp/p2.maxHp*100)+'%';
  document.getElementById('p1-power-fill').style.width = (p1.power/p1.maxPower*100)+'%';
  document.getElementById('p2-power-fill').style.width = (p2.power/p2.maxPower*100)+'%';
  const p1p = p1.hp/p1.maxHp;
  const p2p = p2.hp/p2.maxHp;
  document.getElementById('p1-fill').style.background = p1p < 0.25 ? 'linear-gradient(90deg,#800,#f44)' :
    p1p < 0.5 ? 'linear-gradient(90deg,#c80,#ff4)' : 'linear-gradient(90deg,#c0392b,#e74c3c)';
  document.getElementById('p2-fill').style.background = p2p < 0.25 ? 'linear-gradient(90deg,#800,#f44)' :
    p2p < 0.5 ? 'linear-gradient(90deg,#c80,#ff4)' : 'linear-gradient(90deg,#2471a3,#3498db)';
  document.getElementById('timer-box').textContent = timer;
  document.getElementById('timer-box').style.color = timer <= 10 ? '#f44' : '#f0d060';
}

// ===== COLLISION =====
function rectsOverlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function checkAttacks() {
  if (!p1.isAttacking()) p1AttackHit = false;
  if (!p2.isAttacking()) p2AttackHit = false;
  const hb1 = p1.getHitbox(), hb2 = p2.getHitbox();
  const bb1 = p1.getBodybox(), bb2 = p2.getBodybox();

  if (hb1 && !p1AttackHit && rectsOverlap(hb1, bb2)) {
    const dmg = p1.attackType==='punch'?10:p1.attackType==='kick'?15:35;
    if (p2.takeDamage(dmg, 1)) {
      p1AttackHit = true;
      p1.power = Math.min(p1.maxPower, p1.power+15);
      p1.combo++; p1.comboTimer = 60;
      const label = p1.attackType==='special' ? '★ 必殺！ '+dmg
        : p1.combo>=3 ? p1.combo+'連撃！ '+dmg
        : p1.attackType==='punch' ? '斬！ '+dmg : '重斬！ '+dmg;
      spawnHit(p2.cx, p2.cy-30, label, p1.attackType==='special'?'#f0d060':'#ffe0e0');
      spawnParticles(p2.cx, p2.cy, p1.attackType==='special'?'#f0d060':'#ff6666',
        p1.attackType==='special'?15:6);
    }
  }
  if (hb2 && !p2AttackHit && rectsOverlap(hb2, bb1)) {
    const dmg = p2.attackType==='punch'?10:p2.attackType==='kick'?15:35;
    if (p1.takeDamage(dmg, -1)) {
      p2AttackHit = true;
      p2.power = Math.min(p2.maxPower, p2.power+15);
      p2.combo++; p2.comboTimer = 60;
      const label = p2.attackType==='special' ? '★ 必殺！ '+dmg
        : p2.combo>=3 ? p2.combo+'連撃！ '+dmg
        : p2.attackType==='punch' ? '斬！ '+dmg : '重斬！ '+dmg;
      spawnHit(p1.cx, p1.cy-30, label, p2.attackType==='special'?'#f0d060':'#c0e8ff');
      spawnParticles(p1.cx, p1.cy, p2.attackType==='special'?'#f0d060':'#6699ff',
        p2.attackType==='special'?15:6);
    }
  }
  // Body pushback
  if (rectsOverlap(bb1, bb2)) {
    const ov = (p1.x + p1.width) - p2.x;
    if (ov > 0 && p1.x < p2.x) { p1.x -= ov/2; p2.x += ov/2; }
  }
}

// ===== ROUND CONTROL =====
function startRound() {
  p1 = new Fighter(150, '#c0392b', '#2c3e50', true,  'MUSASHI', p1Controls);
  p2 = new Fighter(590, '#2471a3', '#1a2535', false, 'KOJIRO',  p2Controls);
  p2.isAI = true;
  p1AttackHit = false; p2AttackHit = false;
  timer = 99; hitEffects = []; particles = [];
  gameState = 'fight';
  timerInterval = setInterval(() => {
    if (gameState !== 'fight' || paused) return;
    timer = Math.max(0, timer-1);
    if (timer === 0) endRound('timeout');
  }, 1000);
}

function endRound(reason) {
  clearInterval(timerInterval);
  gameState = 'roundEnd';
  let winner = null;
  if (reason === 'timeout') {
    if (p1.hp > p2.hp) winner = 0;
    else if (p2.hp > p1.hp) winner = 1;
  } else {
    winner = p1.hp <= 0 ? 1 : 0;
  }
  if (winner !== null) roundWins[winner]++;
  if (roundWins[0] >= 2 || roundWins[1] >= 2) setTimeout(() => { gameState = 'gameOver'; }, 1800);
  else { roundNum++; setTimeout(() => startRound(), 2200); }
}

// ===== EFFECTS DRAW =====
function updateAndDrawEffects() {
  hitEffects = hitEffects.filter(e => e.life > 0);
  hitEffects.forEach(e => {
    e.y += e.vy; e.vy *= 0.9; e.life--;
    ctx.save();
    ctx.globalAlpha = Math.min(1, e.life/15);
    ctx.font = `bold ${13+(40-e.life)*0.15}px 'Courier New'`;
    ctx.fillStyle = e.color; ctx.strokeStyle = '#000';
    ctx.lineWidth = 3; ctx.textAlign = 'center';
    ctx.shadowColor = e.color; ctx.shadowBlur = 12;
    ctx.strokeText(e.text, e.x, e.y);
    ctx.fillText(e.text, e.x, e.y);
    ctx.restore();
  });
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--;
    ctx.save();
    ctx.globalAlpha = p.life/50;
    ctx.fillStyle = p.color; ctx.shadowColor = p.color; ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// ===== OVERLAY =====
function drawOverlay() {
  if (gameState === 'title') {
    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fillRect(0, 0, W, H);
    // Decorative lines
    ctx.strokeStyle = '#c0392b44'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(80,0); ctx.lineTo(80,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W-80,0); ctx.lineTo(W-80,H); ctx.stroke();

    ctx.textAlign = 'center';
    ctx.font = 'bold 48px Courier New';
    ctx.fillStyle = '#c0392b';
    ctx.shadowColor = '#c0392b'; ctx.shadowBlur = 30;
    ctx.fillText('SAMURAI FIGHTER', W/2, H/2 - 65);
    ctx.shadowBlur = 0;
    ctx.font = '22px Courier New';
    ctx.fillStyle = '#f0d060';
    ctx.fillText('侍　武蔵 対 小次郎　侍', W/2, H/2 - 28);
    ctx.font = 'bold 17px Courier New';
    ctx.fillStyle = '#fff';
    ctx.fillText('PRESS ENTER TO START', W/2, H/2 + 20);
    ctx.font = '13px Courier New';
    ctx.fillStyle = '#887';
    ctx.fillText('先に2ラウンド取った方が勝ち', W/2, H/2 + 55);

    ctx.font = 'bold 14px Courier New';
    ctx.fillStyle = '#c0392b';
    ctx.textAlign = 'left';
    for (let i=0;i<roundWins[0];i++) ctx.fillText('●', 220+i*18, H/2-2);
    ctx.fillStyle = '#2471a3';
    ctx.textAlign = 'right';
    for (let i=0;i<roundWins[1];i++) ctx.fillText('●', 580-i*18, H/2-2);
    ctx.textAlign = 'left';
  }

  if (gameState === 'fight' || gameState === 'roundEnd') {
    ctx.textAlign = 'center';
    for (let i=0;i<2;i++) {
      ctx.fillStyle = i<roundWins[0]?'#c0392b':'#331';
      ctx.beginPath(); ctx.arc(W/2-20+i*12,15,5,0,Math.PI*2); ctx.fill();
    }
    for (let i=0;i<2;i++) {
      ctx.fillStyle = i<roundWins[1]?'#2471a3':'#113';
      ctx.beginPath(); ctx.arc(W/2+24-i*12,15,5,0,Math.PI*2); ctx.fill();
    }
  }

  if (gameState === 'roundEnd') {
    ctx.textAlign = 'center';
    const winner = p1.hp<=0?'小次郎の勝ち！':p2.hp<=0?'武蔵の勝ち！':
                   p1.hp>p2.hp?'武蔵の勝ち！':p2.hp>p1.hp?'小次郎の勝ち！':'引き分け！';
    const wcolor = (p2.hp<=0||(p1.hp>p2.hp&&p1.hp!==p2.hp)) ? '#c0392b' : '#2471a3';
    ctx.font = 'bold 38px Courier New';
    ctx.fillStyle = wcolor; ctx.shadowColor = wcolor; ctx.shadowBlur = 22;
    ctx.fillText(winner, W/2, H/2-15);
    ctx.shadowBlur = 0;
    ctx.font = 'bold 18px Courier New'; ctx.fillStyle = '#f0d060';
    ctx.fillText('第'+roundNum+'回戦', W/2, H/2+22);
  }

  if (gameState === 'gameOver') {
    ctx.fillStyle = 'rgba(0,0,0,0.78)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    const playerWon = roundWins[0] > roundWins[1];
    const champ = playerWon ? '武蔵' : '小次郎';
    const cc = playerWon ? '#c0392b' : '#2471a3';
    ctx.font = 'bold 52px Courier New';
    ctx.fillStyle = cc; ctx.shadowColor = cc; ctx.shadowBlur = 35;
    ctx.fillText(champ+'の勝利！', W/2, H/2 - 42);
    ctx.shadowBlur = 0;
    ctx.font = 'bold 20px Courier New'; ctx.fillStyle = '#f0d060';
    ctx.fillText(playerWon ? '天下無双' : 'GAME OVER', W/2, H/2+8);
    ctx.font = '15px Courier New'; ctx.fillStyle = '#887';
    ctx.fillText('ENTER でもう一度', W/2, H/2+50);
  }
}

// ===== MAIN LOOP =====
let lastTime = 0;
function gameLoop(ts) {
  lastTime = ts;
  shakeX *= 0.7; shakeY *= 0.7;

  ctx.save();
  ctx.translate(Math.round(shakeX), Math.round(shakeY));
  ctx.clearRect(-5, -5, W+10, H+10);
  drawBackground();

  // Ambient petals (always in background)
  updateDrawPetals();

  if (paused && gameState === 'fight') {
    p2.draw(); p1.draw();
    updateAndDrawEffects();
    ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign = 'center';
    ctx.font = 'bold 44px Courier New'; ctx.fillStyle = '#f0d060';
    ctx.shadowColor = '#f0d060'; ctx.shadowBlur = 22;
    ctx.fillText('一時停止', W/2, H/2-10);
    ctx.shadowBlur = 0;
    ctx.font = '15px Courier New'; ctx.fillStyle = '#aaa';
    ctx.fillText('SPACE キーで再開', W/2, H/2+30);
    ctx.restore();
    Object.keys(justPressed).forEach(k=>delete justPressed[k]);
    updateHUD(); requestAnimationFrame(gameLoop); return;
  }

  if (gameState === 'fight' || gameState === 'roundEnd') {
    let aiCmd = null;
    if (gameState === 'fight') aiCmd = p2.aiThink(p1);
    p1.update(p2); p2.update(p1);
    if (gameState === 'fight') {
      if (justPressed[p1Controls.punch]) p1.tryAttack('punch');
      if (justPressed[p1Controls.kick])  p1.tryAttack('kick');
      if (justPressed[p1Controls.special]) p1.tryAttack('special');
      if (aiCmd) p2.tryAttack(aiCmd);
      checkAttacks();
      if (p1.hp <= 0 || p2.hp <= 0) endRound('ko');
    }
    p2.draw(); p1.draw();
    ctx.textAlign = 'center'; ctx.font = 'bold 10px Courier New';
    ctx.fillStyle = '#fff8';
    ctx.fillText(Math.ceil(p1.hp), p1.cx, p1.y-p1.height-10);
    ctx.fillText(Math.ceil(p2.hp), p2.cx, p2.y-p2.height-10);
    updateAndDrawEffects();
  }

  drawOverlay();

  if (justPressed['Enter']) {
    if (gameState === 'title') startRound();
    else if (gameState === 'gameOver') {
      roundWins = [0,0]; roundNum = 1; gameState = 'title';
    }
  }

  ctx.restore();
  Object.keys(justPressed).forEach(k=>delete justPressed[k]);
  updateHUD();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
